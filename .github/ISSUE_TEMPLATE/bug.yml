name: Bug report
description: Tell us about a reproducible Rowpack problem.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to make Rowpack better.
  - type: input
    id: version
    attributes:
      label: Rowpack version
      placeholder: v0.1.0
    validations:
      required: true
  - type: dropdown
    id: surface
    attributes:
      label: Where did it happen?
      options:
        - CLI compilation
        - Generated HTML app
        - Saving or exporting
        - Live demo
        - Other
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include the command, input shape and exact steps. Remove sensitive data.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: macOS 15, Node 24.14, Chrome 140
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues.
          required: true
        - label: I removed private or confidential records from the report.
          required: true
