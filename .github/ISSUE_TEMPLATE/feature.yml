name: Feature idea
description: Propose a focused improvement to Rowpack.
title: "[Idea]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Describe the workflow before describing a solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed experience
    validations:
      required: true
  - type: textarea
    id: portability
    attributes:
      label: How does this preserve the single-file model?
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and discussions.
          required: true
